name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - name: Build and install wheel smoke
        run: |
          python -m pip wheel . --no-deps -w /tmp/telegram-presence-wheel
          python -m pip install --force-reinstall /tmp/telegram-presence-wheel/telegram_presence-*.whl
          cd /tmp
          python -c "import importlib.metadata as md; import telegram_presence; from telegram_presence import InboxAddResult; from telegram_presence.transports.bot_api import BotApiTransport; assert telegram_presence.__version__ == '0.2.1'; assert md.version('telegram-presence') == '0.2.1'; assert InboxAddResult.__name__ == 'InboxAddResult'; assert BotApiTransport.transport_name == 'bot_api'"
      - run: python -m pytest tests/ -q
